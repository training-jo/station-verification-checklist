<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel</title>

  <link rel="stylesheet" href="style.css" />
  <script src="app/auth.js"></script>
</head>

<body class="admin-page">

  <!-- 🔴 HEADER -->
  <div class="hero small-hero">
    <div class="hero-badge">Junior's Training Department</div>

    <div class="hero-top">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h1>Admin Panel</h1>
    <p>Create Store Users</p>
  </div>

  <!-- 🟡 FORM SECTION -->
 <div class="admin-container">

  <!-- 🟡 FORM CARD -->
  <div class="admin-card">
    <h2>Create Store User</h2>

    <div class="form-group">
      <input id="username" type="text" placeholder="Store ID (e.g. 962001)" />
    </div>

    <div class="form-group">
      <input id="password" type="password" placeholder="Password" />
    </div>

    <div class="form-group">
      <select id="role">
        <option value="store">Store</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button class="create-btn" onclick="createUser()">Create User</button>

    <p id="statusMsg" class="status-msg"></p>
  </div>

  <!-- 🔵 USERS LIST (ADD THIS PART) -->
  <div class="admin-users">
    <h2>Users List</h2>
    <div id="usersList"></div>
  </div>

</div>

  <!-- 🔵 USERS LIST (OUTSIDE CARD) -->
  <div class="admin-users">
    <h2>Users List</h2>
    <div id="usersList"></div>
  </div>

  <!-- JS -->
  <script>

    async function initAdmin() {
      await checkAuth();   // ✅ ensure user is authenticated first
      loadUsers();         // ✅ then load users
    }

    initAdmin();

    async function createUser() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;
      const token = localStorage.getItem("token");

      const msg = document.getElementById("statusMsg");

      try {
        const res = await fetch("https://station-verification-checklist-backend.onrender.com/create-user", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ username, password, role })
        });

        const data = await res.json();

        if (data.ok) {
          msg.innerText = "✅ User created successfully";
          msg.className = "status-msg success";
          loadUsers(); // refresh list
        } else {
          msg.innerText = "❌ " + (data.error || "Error");
          msg.className = "status-msg error";
        }

      } catch (err) {
        msg.innerText = "❌ Server error";
        msg.className = "status-msg error";
      }
    }

    async function loadUsers() {
      const token = localStorage.getItem("token");

      try {
        const res = await fetch("https://station-verification-checklist-backend.onrender.com/users", {
          headers: {
            Authorization: "Bearer " + token
          }
        });

        const data = await res.json();

        const container = document.getElementById("usersList");
        container.innerHTML = "";

        if (!data.ok) return;

        data.users.forEach(user => {
          const div = document.createElement("div");
          div.className = "user-item";

          div.innerHTML = `
            <span>${user.username} (${user.role})</span>
            <button onclick="deleteUser('${user.username}')">Delete</button>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        console.error(err);
      }
    }

    async function deleteUser(username) {
      const token = localStorage.getItem("token");

      try {
        const res = await fetch(`https://station-verification-checklist-backend.onrender.com/users/${username}`, {
          method: "DELETE",
          headers: {
            Authorization: "Bearer " + token
          }
        });

        const data = await res.json();

        if (data.ok) {
          loadUsers();
        } else {
          alert("❌ Failed to delete user");
        }

      } catch (err) {
        alert("❌ Server error");
      }
    }

  </script>

</body>
</html>
